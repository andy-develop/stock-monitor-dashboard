<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票监控看板</title>
    <script src="echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .main-panel {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 24px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .main-panel:last-child { margin-bottom: 0; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { margin: 0; font-size: 24px; color: #1a1a1a; }
        .header .subtitle { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        .header .hint {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            background: #fff7e6;
            border: 1px solid #ffd591;
            color: #ad6800;
            border-radius: 4px;
            font-size: 12px;
        }
        .header .meta { text-align: right; color: #888; font-size: 13px; }
        .category-header {
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eee;
        }
        .category-header h1 {
            margin: 0;
            font-size: 22px;
            color: #1a1a1a;
            padding: 10px 14px;
            border-radius: 8px;
            display: inline-block;
            background: #2c3e50;
            color: #fff;
            transition: background 0.25s ease;
        }
        .category-header h1.danger { background: #c62828; }
        .window-group { margin-bottom: 20px; }
        .window-group:last-child { margin-bottom: 0; }
        .signal-card {
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .signal-card:last-child { margin-bottom: 0; }
        .signal-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            padding: 16px 20px;
            font-size: 18px;
            color: #fff;
            background: #2c3e50;
            cursor: pointer;
            user-select: none;
            transition: background 0.25s ease;
        }
        .signal-title:hover { opacity: 0.95; }
        .signal-title .signal-toggle-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .signal-title .signal-toggle-btn:hover { background: rgba(255,255,255,0.3); }
        .signal-title.danger { background: #c62828; }
        .signal-title.danger:hover { background: #b71c1c; }
        .signals-list {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
        }
        .signals-list.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .signals-list.expanded {
            max-height: 2000px;
            opacity: 1;
            padding: 16px 20px;
        }
        .alert-card {
            padding: 15px 18px;
            border-radius: 6px;
            margin-bottom: 14px;
            border-left: 5px solid;
        }
        .alert-card:last-child { margin-bottom: 0; }
        .alert-danger { background: #fff0f0; border-left-color: #ff4d4f; color: #a61d24; }
        .alert-warning { background: #fff0f0; border-left-color: #ff7875; color: #a8071a; }
        .alert-yellow { background: #fffbe6; border-left-color: #fadb14; color: #ad8b00; }
        .alert-success { background: #f6ffed; border-left-color: #52c41a; color: #237804; }
        .alert-card h3 { margin: 0 0 10px 0; font-size: 17px; }
        .alert-card p { margin: 0 0 12px 0; font-size: 14px; line-height: 1.5; }
        .alert-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .alert-metric {
            background: rgba(255,255,255,0.65);
            padding: 10px 14px;
            border-radius: 6px;
        }
        .alert-metric .label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
        .alert-metric .value { font-size: 18px; font-weight: 600; }
        .signal-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .signal-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.65);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .signal-detail .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .signal-detail .dot.on { background: #ff4d4f; }
        .signal-detail .dot.off { background: #bfbfbf; }
        .chart-box {
            background: rgba(255,255,255,0.55);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 10px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-box h2 { margin: 0; font-size: 15px; color: #444; }
        .toggle-btn {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.12);
            color: #333;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,1); }
        .chart-panel {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease;
        }
        .chart-panel.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }
        .chart-panel.expanded {
            max-height: 560px;
            opacity: 1;
            margin-top: 12px;
        }
        .chart { width: 100%; height: 500px; }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        .section-divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header .meta { text-align: left; }
            .chart { height: 360px; }
            .chart-panel.expanded { max-height: 420px; }
        }
    </style>
</head>
<body>
    <div class="container" id="dashboard-container"></div>

    <script>
        // 数据占位符，由构建脚本注入
        // __DATA_PLACEHOLDER__

        if (!window.DASHBOARD_DATA) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;">数据加载失败，请稍后刷新</div>';
            throw new Error('DASHBOARD_DATA not found');
        }

        const windows = window.DASHBOARD_DATA;
        const container = document.getElementById('dashboard-container');
        const chartInstances = {};

        function renderAlertMetrics(metrics) {
            if (!metrics || metrics.length === 0) return '';
            const items = metrics.map(m => `
                <div class="alert-metric">
                    <div class="label">${m.label}</div>
                    <div class="value">${m.value}</div>
                </div>
            `).join('');
            return `<div class="alert-metrics">${items}</div>`;
        }

        function renderSignalDetails(details) {
            if (!details || details.length === 0) return '';
            const items = details.map(d => `
                <div class="signal-detail">
                    <span>${d.triggered ? '✅' : '❌'}</span>
                    <span>${d.label}：${d.value}</span>
                </div>
            `).join('');
            return `<div class="signal-details">${items}</div>`;
        }

        function renderChartsHtml(windowIndex, chartKeys) {
            if (!chartKeys || chartKeys.length === 0) return '';
            const chartTitles = {
                week: '周K线及 KDJ(9,3,3) 联动趋势图',
                month: '月K线及 MA 趋势图',
                monthBoll: '月K线及 BOLL(20,2) 趋势图',
                monthKdj: '月K线及 KDJ(9,3,3) 联动趋势图',
                boll: '周K线及 BOLL(20,2) 趋势图',
                rsi: '周K线 RSI(6) 趋势图',
                day: '日K线及 MA5 / MA20 / 10日高点 趋势图',
            };
            return chartKeys.map(key => {
                const panelId = `chart-panel-${windowIndex}-${key}`;
                const chartId = `chart-${windowIndex}-${key}`;
                return `
                    <div class="chart-box">
                        <div class="chart-header">
                            <h2>${chartTitles[key] || key}</h2>
                            <button class="toggle-btn" type="button" data-target="${panelId}" data-window="${windowIndex}" data-chart="${key}">展开</button>
                        </div>
                        <div id="${panelId}" class="chart-panel collapsed">
                            <div id="${chartId}" class="chart"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAlertCard(alert, windowIndex) {
            const chartsHtml = renderChartsHtml(windowIndex, alert.chartKeys || []);
            const detailsHtml = renderSignalDetails(alert.signalDetails);
            const metricsHtml = renderAlertMetrics(alert.metrics);
            return `
                <div class="alert-card alert-${alert.type}">
                    <h3>${alert.title}</h3>
                    <p>${alert.reason}</p>
                    ${metricsHtml}
                    ${detailsHtml}
                    ${chartsHtml}
                </div>
            `;
        }

        function renderWindow(windowData, index) {
            const buyAlertsHtml = windowData.buyAlerts.map(a => renderAlertCard(a, index)).join('');
            const sellAlertHtml = windowData.sellAlert
                ? renderAlertCard(windowData.sellAlert, index)
                : '<div class="empty-state">暂无信号</div>';

            return `
                <div class="window-group" data-window-index="${index}">
                    <div class="header">
                        <div>
                            <h1>${windowData.stockName} (${windowData.stockCode})</h1>
                            <p class="subtitle">${windowData.indexName} · 自动化监控${windowData.hint ? `<span class="hint">${windowData.hint}</span>` : ''}</p>
                        </div>
                        <div class="meta">
                            <div>更新时间：${windowData.updateTime}</div>
                        </div>
                    </div>

                    <div class="signal-card">
                        <h2 class="signal-title" data-target="buy-list-${index}">
                            <span>${windowData.buySectionTitle}</span>
                            <button class="signal-toggle-btn" type="button" data-target="buy-list-${index}">展开</button>
                        </h2>
                        <div class="signals-list collapsed" id="buy-list-${index}">
                            ${buyAlertsHtml}
                        </div>
                    </div>

                    <div class="signal-card">
                        <h2 class="signal-title" data-target="sell-list-${index}">
                            <span>${windowData.sellSectionTitle}</span>
                            <button class="signal-toggle-btn" type="button" data-target="sell-list-${index}">展开</button>
                        </h2>
                        <div class="signals-list collapsed" id="sell-list-${index}">
                            ${sellAlertHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCategory(category, windows) {
            const windowsHtml = windows.map((w, i) => {
                const html = renderWindow(w, w._index);
                return i < windows.length - 1 ? html + '<div class="section-divider"></div>' : html;
            }).join('');

            const panel = document.createElement('div');
            panel.className = 'main-panel';
            panel.innerHTML = `
                <div class="category-header">
                    <h1>${category}板块</h1>
                </div>
                ${windowsHtml}
            `;
            container.appendChild(panel);

            // 板块标题颜色联动
            const hasDanger = panel.querySelector('.alert-danger') !== null
                || panel.querySelector('.alert-warning') !== null;
            const categoryTitle = panel.querySelector('.category-header h1');
            if (hasDanger) {
                categoryTitle.classList.add('danger');
            }
        }

        // 按板块分组渲染
        const categories = {};
        windows.forEach((w, i) => {
            w._index = i;
            const category = w.category || '其他';
            if (!categories[category]) categories[category] = [];
            categories[category].push(w);
        });

        Object.entries(categories).forEach(([category, catWindows]) => {
            renderCategory(category, catWindows);
        });

        // 单个窗口标题颜色联动
        windows.forEach((w, i) => {
            ['buy-list', 'sell-list'].forEach(kind => {
                const list = document.getElementById(`${kind}-${i}`);
                const title = document.querySelector(`.window-group[data-window-index="${i}"] .signal-title[data-target="${kind}-${i}"]`);
                if (!list || !title) return;
                const hasDanger = list.querySelector('.alert-danger') !== null
                    || list.querySelector('.alert-warning') !== null;
                if (hasDanger) {
                    title.classList.add('danger');
                }
            });
        });

        // 图表初始化函数
        function initEtfWeekChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-week`));
            chart.setOption({
                grid: [
                    { left: '8%', right: '4%', top: '10%', height: '45%' },
                    { left: '8%', right: '4%', top: '62%', height: '28%' }
                ],
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['周K线', 'K', 'D', 'J'], top: 0 },
                xAxis: [
                    { type: 'category', data: data.weekData.dates, gridIndex: 0 },
                    { type: 'category', data: data.weekData.dates, gridIndex: 1 }
                ],
                yAxis: [
                    { scale: true, splitArea: { show: true }, gridIndex: 0 },
                    { min: 0, max: 100, gridIndex: 1 }
                ],
                dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 50, end: 100 }],
                series: [
                    {
                        name: '周K线', type: 'candlestick', data: data.weekData.candlestick,
                        xAxisIndex: 0, yAxisIndex: 0,
                        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' }
                    },
                    { name: 'K', type: 'line', data: data.weekData.k, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#e0a926' } },
                    { name: 'D', type: 'line', data: data.weekData.d, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#3277c9' } },
                    { name: 'J', type: 'line', data: data.weekData.j, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#c437a3' } }
                ]
            });
            return chart;
        }

        function initEtfMonthChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-month`));
            const maEstimated = data.monthData && data.monthData.estimated;
            const maNameSuffix = maEstimated ? '（估算）' : '';
            const series = [
                { name: '收盘价', type: 'line', data: data.monthData.closes, showSymbol: false, itemStyle: { color: '#3277c9' }, areaStyle: { opacity: 0.1 } }
            ];
            const legend = ['收盘价'];
            if (data.monthData.maPeriod) {
                series.push({ name: `MA${data.monthData.maPeriod}${maNameSuffix}`, type: 'line', data: data.monthData.ma, showSymbol: false, itemStyle: { color: '#e0a926' } });
                legend.push(`MA${data.monthData.maPeriod}${maNameSuffix}`);
            }
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: legend, top: 0 },
                xAxis: { type: 'category', data: data.monthData.dates },
                yAxis: { scale: true, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 0, end: 100 }],
                series
            });
            return chart;
        }

        function initEtfBollChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-boll`));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['周K线', 'BOLL 上轨', 'BOLL 中轨', 'BOLL 下轨'], top: 0 },
                xAxis: { type: 'category', data: data.bollData.dates },
                yAxis: { scale: true, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 50, end: 100 }],
                series: [
                    {
                        name: '周K线', type: 'candlestick', data: data.bollData.candlestick,
                        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' }
                    },
                    { name: 'BOLL 上轨', type: 'line', data: data.bollData.upper, showSymbol: false, itemStyle: { color: '#ff9800' }, lineStyle: { type: 'dashed' } },
                    { name: 'BOLL 中轨', type: 'line', data: data.bollData.middle, showSymbol: false, itemStyle: { color: '#9e9e9e' } },
                    { name: 'BOLL 下轨', type: 'line', data: data.bollData.lower, showSymbol: false, itemStyle: { color: '#00bcd4' }, lineStyle: { type: 'dashed' } }
                ]
            });
            return chart;
        }

        function initEtfRsiChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-rsi`));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['RSI(6)'], top: 0 },
                xAxis: { type: 'category', data: data.rsiData.dates },
                yAxis: { min: 0, max: 100, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 50, end: 100 }],
                series: [
                    {
                        name: 'RSI(6)', type: 'line', data: data.rsiData.values, showSymbol: false,
                        itemStyle: { color: '#9c27b0' }, areaStyle: { opacity: 0.1 },
                        markLine: {
                            silent: true, symbol: 'none',
                            data: [{ yAxis: 70, lineStyle: { color: '#ff9800', type: 'dashed' }, label: { formatter: '70' } }]
                        }
                    }
                ]
            });
            return chart;
        }

        function initEtfMonthBollChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-monthBoll`));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['月K线', 'BOLL 上轨', 'BOLL 中轨', 'BOLL 下轨'], top: 0 },
                xAxis: { type: 'category', data: data.monthBollData.dates },
                yAxis: { scale: true, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 0, end: 100 }],
                series: [
                    {
                        name: '月K线', type: 'candlestick', data: data.monthBollData.candlestick,
                        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' }
                    },
                    { name: 'BOLL 上轨', type: 'line', data: data.monthBollData.upper, showSymbol: false, itemStyle: { color: '#ff9800' }, lineStyle: { type: 'dashed' } },
                    { name: 'BOLL 中轨', type: 'line', data: data.monthBollData.middle, showSymbol: false, itemStyle: { color: '#9e9e9e' } },
                    { name: 'BOLL 下轨', type: 'line', data: data.monthBollData.lower, showSymbol: false, itemStyle: { color: '#00bcd4' }, lineStyle: { type: 'dashed' } }
                ]
            });
            return chart;
        }

        function initEtfMonthKdjChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-monthKdj`));
            chart.setOption({
                grid: [
                    { left: '8%', right: '4%', top: '10%', height: '45%' },
                    { left: '8%', right: '4%', top: '62%', height: '28%' }
                ],
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['月K线', 'K', 'D', 'J'], top: 0 },
                xAxis: [
                    { type: 'category', data: data.monthKdjData.dates, gridIndex: 0 },
                    { type: 'category', data: data.monthKdjData.dates, gridIndex: 1 }
                ],
                yAxis: [
                    { scale: true, splitArea: { show: true }, gridIndex: 0 },
                    { min: -20, max: 100, gridIndex: 1 }
                ],
                dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 }],
                series: [
                    {
                        name: '月K线', type: 'candlestick', data: data.monthKdjData.candlestick,
                        xAxisIndex: 0, yAxisIndex: 0,
                        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' }
                    },
                    { name: 'K', type: 'line', data: data.monthKdjData.k, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#e0a926' } },
                    { name: 'D', type: 'line', data: data.monthKdjData.d, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#3277c9' } },
                    { name: 'J', type: 'line', data: data.monthKdjData.j, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#c437a3' } }
                ]
            });
            return chart;
        }

        function initGreeDayChart(windowIndex, data) {
            const chart = echarts.init(document.getElementById(`chart-${windowIndex}-day`));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['日K线', 'MA5', 'MA20', '10日高点'], top: 0 },
                xAxis: { type: 'category', data: data.dayData.dates },
                yAxis: { scale: true, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 60, end: 100 }],
                series: [
                    {
                        name: '日K线', type: 'candlestick', data: data.dayData.candlestick,
                        itemStyle: { color: '#ef5350', color0: '#26a69a', borderColor: '#ef5350', borderColor0: '#26a69a' }
                    },
                    { name: 'MA5', type: 'line', data: data.dayData.ma5, showSymbol: false, itemStyle: { color: '#e0a926' } },
                    { name: 'MA20', type: 'line', data: data.dayData.ma20, showSymbol: false, itemStyle: { color: '#3277c9' } },
                    { name: '10日高点', type: 'line', data: data.dayData.periodHigh10, showSymbol: false, itemStyle: { color: '#ff5722' }, lineStyle: { type: 'dashed' } }
                ]
            });
            return chart;
        }

        function initChart(windowIndex, chartKey) {
            const key = `${windowIndex}-${chartKey}`;
            if (chartInstances[key]) return chartInstances[key];
            const data = windows[windowIndex];
            let chart;
            if (chartKey === 'week') chart = initEtfWeekChart(windowIndex, data);
            else if (chartKey === 'month') chart = initEtfMonthChart(windowIndex, data);
            else if (chartKey === 'monthBoll') chart = initEtfMonthBollChart(windowIndex, data);
            else if (chartKey === 'monthKdj') chart = initEtfMonthKdjChart(windowIndex, data);
            else if (chartKey === 'boll') chart = initEtfBollChart(windowIndex, data);
            else if (chartKey === 'rsi') chart = initEtfRsiChart(windowIndex, data);
            else if (chartKey === 'day') chart = initGreeDayChart(windowIndex, data);
            if (chart) chartInstances[key] = chart;
            return chart;
        }

        // 大卡片折叠/展开交互
        document.querySelectorAll('.signal-title, .signal-toggle-btn').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('signal-toggle-btn')) {
                    e.stopPropagation();
                }
                const targetId = el.getAttribute('data-target');
                const panel = document.getElementById(targetId);
                const btn = document.querySelector(`.signal-toggle-btn[data-target="${targetId}"]`);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        // 图表折叠/展开交互
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const windowIndex = btn.getAttribute('data-window');
                const chartKey = btn.getAttribute('data-chart');
                const panel = document.getElementById(targetId);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';
                    requestAnimationFrame(() => {
                        const chart = initChart(windowIndex, chartKey);
                        if (chart) chart.resize();
                    });
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        window.addEventListener('resize', () => {
            Object.values(chartInstances).forEach(chart => chart.resize());
        });
    </script>
</body>
</html>
