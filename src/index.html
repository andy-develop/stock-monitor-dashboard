<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 自动化监控看板</title>
    <script src="echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { margin: 0; font-size: 24px; color: #1a1a1a; }
        .header .subtitle { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        .header .meta { text-align: right; color: #888; font-size: 13px; }
        .alert-card {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 5px solid;
        }
        .alert-danger { background: #fff0f0; border-left-color: #ff4d4f; color: #a61d24; }
        .alert-success { background: #f6ffed; border-left-color: #52c41a; color: #237804; }
        .alert-card h3 { margin: 0 0 8px 0; font-size: 18px; }
        .alert-card p { margin: 0; font-size: 14px; line-height: 1.5; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .stat-card .value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
        .chart-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .chart-box h2 { margin-top: 0; font-size: 18px; color: #444; }
        .chart { width: 100%; height: 500px; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header .meta { text-align: left; }
            .chart { height: 360px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="stock-title">加载中...</h1>
                <p class="subtitle" id="stock-subtitle">自动监控系统</p>
            </div>
            <div class="meta">
                <div id="update-time">-</div>
                <div id="data-source" style="margin-top: 4px;"></div>
            </div>
        </div>

        <div id="alerts-container"></div>

        <div class="stats-grid" id="stats-container"></div>

        <div class="chart-box">
            <h2>周K线及 KDJ(9,3,3) 联动趋势图</h2>
            <div id="week-chart" class="chart"></div>
        </div>

        <div class="chart-box">
            <h2>月K线及 MA 趋势图</h2>
            <div id="month-chart" class="chart"></div>
        </div>
    </div>

    <script>
        // 数据占位符，由构建脚本注入
        // __DATA_PLACEHOLDER__

        if (!window.DASHBOARD_DATA) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;">数据加载失败，请稍后刷新</div>';
            throw new Error('DASHBOARD_DATA not found');
        }

        const data = window.DASHBOARD_DATA;

        // 头部信息
        document.getElementById('stock-title').innerText = `${data.stockName} (${data.stockCode})`;
        document.getElementById('stock-subtitle').innerText = `${data.indexName} · 自动化监控`;
        document.getElementById('update-time').innerText = `更新时间：${data.updateTime}`;

        // 预警卡片
        const alertsContainer = document.getElementById('alerts-container');
        data.alerts.forEach(alert => {
            const card = document.createElement('div');
            card.className = `alert-card alert-${alert.type}`;
            card.innerHTML = `<h3>${alert.title}</h3><p>${alert.reason}</p>`;
            alertsContainer.appendChild(card);
        });

        // 统计卡片
        const statsContainer = document.getElementById('stats-container');
        const stats = [
            { label: '最新周收盘价', value: data.weekData.latestClose },
            { label: '最新周 J 值', value: data.weekData.latestJ },
            { label: '最新月收盘价', value: data.monthData.latestClose },
            { label: data.monthData.maPeriod ? `MA${data.monthData.maPeriod}` : 'MA 不可用', value: data.monthData.latestMA ?? '数据不足' },
        ];
        stats.forEach(stat => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML = `<div class="label">${stat.label}</div><div class="value">${stat.value}</div>`;
            statsContainer.appendChild(card);
        });

        // 周线 KDJ 图
        const weekChart = echarts.init(document.getElementById('week-chart'));
        weekChart.setOption({
            grid: [
                { left: '8%', right: '4%', top: '10%', height: '45%' },
                { left: '8%', right: '4%', top: '62%', height: '28%' }
            ],
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' }
            },
            legend: { data: ['周K线', 'K', 'D', 'J'], top: 0 },
            xAxis: [
                { type: 'category', data: data.weekData.dates, gridIndex: 0, axisLine: { onZero: false } },
                { type: 'category', data: data.weekData.dates, gridIndex: 1 }
            ],
            yAxis: [
                { scale: true, splitArea: { show: true }, gridIndex: 0 },
                { min: 0, max: 100, gridIndex: 1 }
            ],
            dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 50, end: 100 }],
            series: [
                {
                    name: '周K线',
                    type: 'candlestick',
                    data: data.weekData.candlestick,
                    xAxisIndex: 0,
                    yAxisIndex: 0,
                    itemStyle: {
                        color: '#ef5350',
                        color0: '#26a69a',
                        borderColor: '#ef5350',
                        borderColor0: '#26a69a'
                    }
                },
                { name: 'K', type: 'line', data: data.weekData.k, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#e0a926' } },
                { name: 'D', type: 'line', data: data.weekData.d, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#3277c9' } },
                { name: 'J', type: 'line', data: data.weekData.j, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#c437a3' } }
            ]
        });

        // 月线 MA 图
        const monthChart = echarts.init(document.getElementById('month-chart'));
        const monthOption = {
            tooltip: { trigger: 'axis' },
            legend: { data: ['收盘价', 'MA'], top: 0 },
            xAxis: { type: 'category', data: data.monthData.dates },
            yAxis: { scale: true, splitArea: { show: true } },
            dataZoom: [{ type: 'inside', start: 0, end: 100 }],
            series: [
                { name: '收盘价', type: 'line', data: data.monthData.closes, showSymbol: false, itemStyle: { color: '#3277c9' }, areaStyle: { opacity: 0.1 } }
            ]
        };
        if (data.monthData.maPeriod) {
            monthOption.series.push({
                name: `MA${data.monthData.maPeriod}`,
                type: 'line',
                data: data.monthData.ma,
                showSymbol: false,
                itemStyle: { color: '#e0a926' }
            });
            monthOption.legend.data.push(`MA${data.monthData.maPeriod}`);
        }
        monthChart.setOption(monthOption);

        window.addEventListener('resize', () => {
            weekChart.resize();
            monthChart.resize();
        });
    </script>
</body>
</html>
