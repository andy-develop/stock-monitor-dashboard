<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低波哨兵 · 监控看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="echarts.min.js"></script>
    <style>
        :root {
            --ink: #122033;
            --ink-soft: #4a5d73;
            --ink-faint: #7a8fa3;
            --mist: #d7e3ee;
            --fog: #eaf1f6;
            --surface: rgba(255, 255, 255, 0.78);
            --surface-solid: #f7fafc;
            --line: rgba(18, 32, 51, 0.1);
            --buy: #0c6f8f;
            --buy-soft: #e3f3f8;
            --sell: #b42318;
            --sell-soft: #fdecea;
            --warn: #9a6b00;
            --warn-soft: #fff6db;
            --ok: #1f6b4a;
            --ok-soft: #e8f6ef;
            --accent: #1a4d6d;
            --shadow: 0 18px 50px rgba(18, 32, 51, 0.08);
            --radius: 18px;
            --font-display: "Noto Serif SC", "Songti SC", serif;
            --font-ui: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-ui);
            color: var(--ink);
            background:
                radial-gradient(1200px 600px at 12% -10%, rgba(12, 111, 143, 0.18), transparent 55%),
                radial-gradient(900px 500px at 88% 8%, rgba(180, 35, 24, 0.08), transparent 50%),
                linear-gradient(165deg, #edf3f8 0%, #dfe9f2 42%, #d5e2ec 100%);
            background-attachment: fixed;
        }

        .atmosphere {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.45;
            background-image:
                linear-gradient(rgba(18, 32, 51, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 32, 51, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 20px 64px;
        }

        /* —— Masthead / Brand —— */
        .masthead {
            display: grid;
            gap: 10px;
            margin-bottom: 28px;
            animation: rise 0.7s ease both;
        }

        .brand-mark {
            display: inline-flex;
            align-items: baseline;
            gap: 10px;
            width: fit-content;
        }

        .brand-mark .brand {
            font-family: var(--font-display);
            font-size: clamp(2.4rem, 5vw, 3.4rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1.1;
            color: var(--ink);
            position: relative;
        }

        .brand-mark .brand::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--buy), transparent 85%);
            transform-origin: left;
            animation: draw 1s 0.25s ease both;
        }

        .brand-mark .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--buy);
            box-shadow: 0 0 0 0 rgba(12, 111, 143, 0.45);
            animation: pulse 2.4s ease-out infinite;
            align-self: center;
            margin-left: 4px;
        }

        .masthead .lede {
            max-width: 36rem;
            margin: 8px 0 0;
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--ink-soft);
        }

        .masthead .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 4px;
            font-size: 0.85rem;
            color: var(--ink-faint);
        }

        .masthead .meta-row span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .masthead .meta-row span::before {
            content: "";
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.55;
        }

        /* —— Shared panels —— */
        .summary-panel,
        .main-panel {
            background: var(--surface);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 26px 28px;
            margin-bottom: 22px;
            animation: rise 0.75s ease both;
        }

        .summary-panel { animation-delay: 0.08s; }
        .main-panel { animation-delay: 0.16s; }
        .main-panel:nth-of-type(3) { animation-delay: 0.22s; }
        .main-panel:nth-of-type(4) { animation-delay: 0.28s; }
        .main-panel:last-child { margin-bottom: 0; }

        .summary-header,
        .header,
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 16px;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        .summary-header h1,
        .header h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: 1.55rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--ink);
        }

        .header .subtitle {
            margin: 8px 0 0;
            color: var(--ink-soft);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .header .meta,
        .summary-header .meta {
            color: var(--ink-faint);
            font-size: 0.82rem;
            text-align: right;
        }

        .header .hint,
        .header .tag {
            display: inline-block;
            margin: 4px 0 0 8px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            vertical-align: middle;
        }

        .header .tag {
            background: var(--buy-soft);
            color: var(--buy);
            border: 1px solid rgba(12, 111, 143, 0.22);
        }

        .header .hint {
            background: var(--warn-soft);
            color: var(--warn);
            border: 1px solid rgba(154, 107, 0, 0.25);
        }

        /* —— Category —— */
        .category-header {
            cursor: pointer;
            user-select: none;
            align-items: center;
            border-bottom: none;
            padding: 14px 16px;
            margin: -10px -12px 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #1d3348, #2a455c);
            transition: filter 0.2s ease, background 0.25s ease;
        }

        .category-header:hover { filter: brightness(1.05); }

        .category-header.has-danger {
            background: linear-gradient(135deg, #8f1d1d, #c0392b);
        }

        .category-header h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            padding: 0;
            background: none;
        }

        .category-header h1.danger {
            background: none;
        }

        .category-content {
            overflow: hidden;
            transition: max-height 0.45s ease, opacity 0.25s ease, margin-top 0.25s ease;
        }

        .category-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .category-content.expanded {
            max-height: 20000px;
            opacity: 1;
            margin-top: 22px;
        }

        .window-group { margin-bottom: 22px; }
        .window-group:last-child { margin-bottom: 0; }

        .section-divider {
            height: 1px;
            background: var(--line);
            margin: 22px 0;
        }

        /* —— Signal sections —— */
        .signal-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.45);
        }

        .signal-card:last-child { margin-bottom: 0; }

        .signal-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #1d3348, #2a455c);
            cursor: pointer;
            user-select: none;
            transition: filter 0.2s ease;
        }

        .signal-title:hover { filter: brightness(1.05); }
        .signal-title.danger {
            background: linear-gradient(135deg, #8f1d1d, #c0392b);
        }

        .signal-toggle-btn,
        .toggle-btn {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .signal-toggle-btn:hover,
        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-1px);
        }

        .toggle-btn {
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.85);
            color: var(--ink);
        }

        .toggle-btn:hover {
            background: #fff;
        }

        .signals-list {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
        }

        .signals-list.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .signals-list.expanded {
            max-height: 2000px;
            opacity: 1;
            padding: 16px 18px;
        }

        /* —— Alerts —— */
        .alert-card {
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 14px;
            border: 1px solid transparent;
            border-left-width: 4px;
        }

        .alert-card:last-child { margin-bottom: 0; }

        .alert-danger {
            background: var(--sell-soft);
            border-color: rgba(180, 35, 24, 0.15);
            border-left-color: var(--sell);
            color: #7a1610;
        }

        .alert-warning {
            background: #fff1f0;
            border-color: rgba(180, 35, 24, 0.12);
            border-left-color: #e07068;
            color: #8a1f18;
        }

        .alert-yellow {
            background: var(--warn-soft);
            border-color: rgba(154, 107, 0, 0.18);
            border-left-color: #d4a017;
            color: var(--warn);
        }

        .alert-success {
            background: var(--ok-soft);
            border-color: rgba(31, 107, 74, 0.14);
            border-left-color: var(--ok);
            color: #15553a;
        }

        .alert-card h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: var(--font-display);
        }

        .alert-card p {
            margin: 0 0 12px;
            font-size: 0.92rem;
            line-height: 1.55;
            opacity: 0.92;
        }

        .alert-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .alert-metric {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(18, 32, 51, 0.05);
        }

        .alert-metric .label {
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            opacity: 0.72;
            margin-bottom: 4px;
        }

        .alert-metric .value {
            font-size: 1.2rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .signal-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .signal-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid rgba(18, 32, 51, 0.05);
        }

        .signal-detail .status {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-grid;
            place-items: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
        }

        .signal-detail .status.on { background: var(--sell); }
        .signal-detail .status.off { background: #9aa8b5; }

        /* —— Charts —— */
        .chart-box {
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(18, 32, 51, 0.06);
            border-radius: 12px;
            padding: 12px 14px;
            margin-top: 10px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .chart-box h2 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--ink-soft);
        }

        .chart-panel {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease;
        }

        .chart-panel.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .chart-panel.expanded {
            max-height: 560px;
            opacity: 1;
            margin-top: 12px;
        }

        .chart { width: 100%; height: 500px; }

        .empty-state {
            padding: 36px 20px;
            text-align: center;
            color: var(--ink-faint);
            font-size: 0.92rem;
        }

        /* —— Summary —— */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .summary-section {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.5);
        }

        .summary-section-title {
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .summary-section-title.buy {
            background: linear-gradient(135deg, #0a5a75, var(--buy));
        }

        .summary-section-title.sell {
            background: linear-gradient(135deg, #8f1d1d, var(--sell));
        }

        .summary-section-body { padding: 14px 16px; }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .summary-item:last-child { margin-bottom: 0; }

        .summary-item.buy {
            background: var(--buy-soft);
            border-left: 3px solid var(--buy);
        }

        .summary-item.sell {
            background: var(--sell-soft);
            border-left: 3px solid var(--sell);
        }

        .summary-item .item-name { font-weight: 600; flex-shrink: 0; }
        .summary-item .item-code {
            font-size: 0.78rem;
            color: var(--ink-faint);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .summary-item .item-reason {
            font-size: 0.84rem;
            color: var(--ink-soft);
            flex: 1;
        }

        .summary-item .item-tag {
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .summary-item .item-tag.buy {
            background: rgba(12, 111, 143, 0.12);
            color: var(--buy);
        }

        .summary-item .item-tag.sell {
            background: rgba(180, 35, 24, 0.12);
            color: var(--sell);
        }

        .summary-item.clickable {
            cursor: pointer;
            transition: box-shadow 0.2s ease, filter 0.2s ease;
        }
        .summary-item.clickable:hover {
            box-shadow: 0 0 0 2px rgba(12, 111, 143, 0.3);
            filter: brightness(0.97);
        }
        .summary-item.clickable.sell:hover {
            box-shadow: 0 0 0 2px rgba(180, 35, 24, 0.3);
        }

        .summary-empty {
            padding: 28px 16px;
            text-align: center;
            color: var(--ink-faint);
            font-size: 0.9rem;
        }

        .summary-category-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-right: 2px;
        }

        .summary-category-tag.etf {
            background: rgba(12, 111, 143, 0.12);
            color: var(--buy);
        }

        .summary-category-tag.stock {
            background: rgba(31, 107, 74, 0.12);
            color: var(--ok);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes draw {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(12, 111, 143, 0.45); }
            70% { box-shadow: 0 0 0 12px rgba(12, 111, 143, 0); }
            100% { box-shadow: 0 0 0 0 rgba(12, 111, 143, 0); }
        }

        @media (max-width: 768px) {
            .page { padding: 18px 14px 48px; }
            .summary-panel,
            .main-panel { padding: 18px 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header .meta,
            .summary-header .meta { text-align: left; }
            .chart { height: 360px; }
            .chart-panel.expanded { max-height: 420px; }
            .summary-grid { grid-template-columns: 1fr; }
            .summary-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .brand-mark .brand { font-size: 2.1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="atmosphere" aria-hidden="true"></div>
    <div class="page">
        <header class="masthead">
            <div class="brand-mark">
                <h1 class="brand">低波哨兵</h1>
                <span class="pulse" aria-hidden="true"></span>
            </div>
            <p class="lede">红利低波与重点标的的自动化信号台。先看今日触发，再按板块下钻图表。</p>
            <div class="meta-row">
                <span>周 KDJ · 月均线 · BOLL / RSI</span>
                <span>GitHub Actions 日更</span>
            </div>
        </header>
        <main id="dashboard-container"></main>
    </div>

    <script>
        // 数据占位符，由构建脚本注入
        // __DATA_PLACEHOLDER__

        if (!window.DASHBOARD_DATA) {
            document.getElementById('dashboard-container').innerHTML =
                '<div class="summary-panel"><div class="empty-state">数据加载失败，请稍后刷新</div></div>';
            throw new Error('DASHBOARD_DATA not found');
        }

        const windows = window.DASHBOARD_DATA;
        const container = document.getElementById('dashboard-container');
        const chartInstances = {};

        if (windows[0]?.updateTime) {
            const metaRow = document.querySelector('.masthead .meta-row');
            if (metaRow) {
                const timeEl = document.createElement('span');
                timeEl.textContent = `最近更新 ${windows[0].updateTime}`;
                metaRow.appendChild(timeEl);
            }
        }

        function renderAlertMetrics(metrics) {
            if (!metrics || metrics.length === 0) return '';
            const items = metrics.map(m => `
                <div class="alert-metric">
                    <div class="label">${m.label}</div>
                    <div class="value">${m.value}</div>
                </div>
            `).join('');
            return `<div class="alert-metrics">${items}</div>`;
        }

        function renderSignalDetails(details) {
            if (!details || details.length === 0) return '';
            const items = details.map(d => `
                <div class="signal-detail">
                    <span class="status ${d.triggered ? 'on' : 'off'}" aria-hidden="true">${d.triggered ? '!' : '·'}</span>
                    <span>${d.label}：${d.value}</span>
                </div>
            `).join('');
            return `<div class="signal-details">${items}</div>`;
        }

        function renderChartsHtml(windowIndex, chartKeys) {
            if (!chartKeys || chartKeys.length === 0) return '';
            const chartTitles = {
                week: '周K线及 KDJ(9,3,3) 联动趋势图',
                month: '月K线及 MA 趋势图',
                monthBoll: '月K线及 BOLL(20,2) 趋势图',
                monthKdj: '月K线及 KDJ(9,3,3) 联动趋势图',
                boll: '周K线及 BOLL(20,2) 趋势图',
                rsi: '周K线 RSI(6) 趋势图',
                deviation: '近10年偏离度曲线（日K · 价格/MA60 - 1）',
                day: '日K线及 MA5 / MA20 / 10日高点 趋势图',
                weekMA: '周K线及 MA5 / MA10 趋势图',
                weekBollMA60: '周K线及 BOLL(20,2) / MA60 趋势图',
                monthMA20: '月K线及 MA20 趋势图',
            };
            return chartKeys.map(key => {
                const panelId = `chart-panel-${windowIndex}-${key}`;
                const chartId = `chart-${windowIndex}-${key}`;
                return `
                    <div class="chart-box">
                        <div class="chart-header">
                            <h2>${chartTitles[key] || key}</h2>
                            <button class="toggle-btn" type="button" data-target="${panelId}" data-window="${windowIndex}" data-chart="${key}">展开</button>
                        </div>
                        <div id="${panelId}" class="chart-panel collapsed">
                            <div id="${chartId}" class="chart"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function cleanAlertTitle(title) {
            return String(title || '').replace(/^[⚠️✅📋🟢]\s*/u, '').trim();
        }

        function renderAlertCard(alert, windowIndex, alertIndex, sectionKey) {
            const chartsHtml = renderChartsHtml(windowIndex, alert.chartKeys || []);
            const detailsHtml = renderSignalDetails(alert.signalDetails);
            const metricsHtml = renderAlertMetrics(alert.metrics);
            const alertId = `alert-${windowIndex}-${sectionKey || 'default'}-${alertIndex !== undefined ? alertIndex : 'default'}`;
            return `
                <div class="alert-card alert-${alert.type}" id="${alertId}">
                    <h3>${cleanAlertTitle(alert.title)}</h3>
                    <p>${alert.reason}</p>
                    ${metricsHtml}
                    ${detailsHtml}
                    ${chartsHtml}
                </div>
            `;
        }

        function renderWindow(windowData, index) {
            const sections = [
                {
                    key: 'buy',
                    title: windowData.buySectionTitle,
                    alerts: windowData.buyAlerts || [],
                },
                {
                    key: 'sell',
                    title: windowData.sellSectionTitle,
                    alerts: windowData.sellAlert ? [windowData.sellAlert] : [],
                },
            ];

            if (windowData.trendSectionTitle) {
                sections.push({
                    key: 'trend',
                    title: windowData.trendSectionTitle,
                    alerts: windowData.trendAlerts || [],
                });
            }
            if (windowData.deviationSectionTitle) {
                sections.push({
                    key: 'deviation',
                    title: windowData.deviationSectionTitle,
                    alerts: windowData.deviationAlerts || [],
                });
            }

            const sectionsHtml = sections.map(section => {
                const listId = `${section.key}-list-${index}`;
                const alertsHtml = section.alerts.length > 0
                    ? section.alerts.map((a, ai) => renderAlertCard(a, index, ai, section.key)).join('')
                    : '<div class="empty-state">暂无信号</div>';
                return `
                    <div class="signal-card">
                        <h2 class="signal-title" data-target="${listId}">
                            <span>${section.title}</span>
                            <button class="signal-toggle-btn" type="button" data-target="${listId}">展开</button>
                        </h2>
                        <div class="signals-list collapsed" id="${listId}">
                            ${alertsHtml}
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="window-group" data-window-index="${index}">
                    <div class="header">
                        <div>
                            <h1>${windowData.stockName} <span style="font-weight:500;color:var(--ink-faint);font-size:0.85em;font-family:var(--font-ui)">(${windowData.stockCode})</span></h1>
                            <p class="subtitle">${windowData.indexName} · 自动化监控${windowData.tags ? windowData.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''}${windowData.hint ? `<span class="hint">${windowData.hint}</span>` : ''}</p>
                        </div>
                        <div class="meta">
                            <div>更新时间：${windowData.updateTime}</div>
                        </div>
                    </div>
                    ${sectionsHtml}
                </div>
            `;
        }

        function renderCategory(category, windows, categoryIndex) {
            const contentId = `category-content-${categoryIndex}`;
            const windowsHtml = windows.map((w, i) => {
                const html = renderWindow(w, w._index);
                return i < windows.length - 1 ? html + '<div class="section-divider"></div>' : html;
            }).join('');

            const panel = document.createElement('div');
            panel.className = 'main-panel';
            panel.innerHTML = `
                <div class="category-header" data-target="${contentId}">
                    <h1>${category}板块</h1>
                    <button class="signal-toggle-btn" type="button" data-target="${contentId}">展开</button>
                </div>
                <div class="category-content collapsed" id="${contentId}">
                    ${windowsHtml}
                </div>
            `;
            container.appendChild(panel);

            const hasDanger = panel.querySelector('.alert-danger') !== null
                || panel.querySelector('.alert-warning') !== null;
            const categoryHeader = panel.querySelector('.category-header');
            const categoryTitle = panel.querySelector('.category-header h1');
            if (hasDanger) {
                categoryHeader.classList.add('has-danger');
                categoryTitle.classList.add('danger');
            }
        }

        function isAlertTriggered(alert) {
            if (!alert) return false;
            return alert.type === 'danger' || alert.type === 'warning' || alert.type === 'yellow';
        }

        function buildSummary() {
            const buyTriggered = [];
            const sellTriggered = [];

            windows.forEach((w, wi) => {
                const category = w.category || '其他';
                const catClass = category === 'ETF' ? 'etf' : 'stock';

                if (w.buyAlerts && w.buyAlerts.length > 0) {
                    w.buyAlerts.forEach((a, ai) => {
                        if (isAlertTriggered(a)) {
                            buyTriggered.push({
                                name: w.stockName,
                                code: w.stockCode,
                                category: catClass,
                                title: a.title,
                                reason: a.reason,
                                windowIndex: wi,
                                alertIndex: ai,
                                sectionKey: 'buy',
                            });
                        }
                    });
                }

                if (w.sellAlert) {
                    if (isAlertTriggered(w.sellAlert)) {
                        sellTriggered.push({
                            name: w.stockName,
                            code: w.stockCode,
                            category: catClass,
                            title: w.sellAlert.title,
                            reason: w.sellAlert.reason,
                            windowIndex: wi,
                            alertIndex: 0,
                            sectionKey: 'sell',
                        });
                    }
                }
            });

            return { buyTriggered, sellTriggered };
        }

        function renderSummaryItem(item, type) {
            const catLabel = item.category === 'etf' ? 'ETF' : '股票';
            const targetId = `alert-${item.windowIndex}-${item.sectionKey}-${item.alertIndex}`;
            const listId = `${item.sectionKey}-list-${item.windowIndex}`;
            return `
                <div class="summary-item ${type} clickable" data-alert-id="${targetId}" data-list-id="${listId}">
                    <span class="summary-category-tag ${item.category}">${catLabel}</span>
                    <span class="item-name">${item.name}</span>
                    <span class="item-code">${item.code}</span>
                    <span class="item-reason">${item.reason}</span>
                    <span class="item-tag ${type}">${type === 'buy' ? '买入' : '卖出'}</span>
                </div>
            `;
        }

        function renderSummary() {
            const summary = buildSummary();
            const updateTime = windows[0]?.updateTime || '';

            const buyHtml = summary.buyTriggered.length > 0
                ? summary.buyTriggered.map(item => renderSummaryItem(item, 'buy')).join('')
                : '<div class="summary-empty">今日无 ETF / 股票触发买入信号</div>';

            const sellHtml = summary.sellTriggered.length > 0
                ? summary.sellTriggered.map(item => renderSummaryItem(item, 'sell')).join('')
                : '<div class="summary-empty">今日无 ETF / 股票触发卖出信号</div>';

            const panel = document.createElement('div');
            panel.className = 'summary-panel';
            panel.innerHTML = `
                <div class="summary-header">
                    <h1>今日小结</h1>
                    <div class="meta">更新时间：${updateTime}</div>
                </div>
                <div class="summary-grid">
                    <div class="summary-section">
                        <div class="summary-section-title buy">买入信号（${summary.buyTriggered.length}）</div>
                        <div class="summary-section-body">
                            ${buyHtml}
                        </div>
                    </div>
                    <div class="summary-section">
                        <div class="summary-section-title sell">卖出信号（${summary.sellTriggered.length}）</div>
                        <div class="summary-section-body">
                            ${sellHtml}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(panel);

        renderSummary();

        // 今日小结：点击跳转到对应信号详情
        function jumpToAlert(alertId, listId) {
            const alertEl = document.getElementById(alertId);
            if (!alertEl) return;

            // 找到 signal-card 的 list 容器
            const list = document.getElementById(listId);
            if (list) {
                const signalTitle = document.querySelector(`.signal-title[data-target="${listId}"]`);
                const toggleBtn = signalTitle?.querySelector('.signal-toggle-btn');
                if (list.classList.contains('collapsed')) {
                    list.classList.remove('collapsed');
                    list.classList.add('expanded');
                    if (toggleBtn) toggleBtn.innerText = '收起';
                }
                handleDeviationAutoExpand(listId);
            }

            // 找到 window-group 并展开其所属 category
            const windowGroup = alertEl.closest('.window-group');
            if (windowGroup) {
                const categoryContent = windowGroup.parentElement;
                if (categoryContent && categoryContent.classList.contains('collapsed')) {
                    const catId = categoryContent.id;
                    const catHeader = document.querySelector(`.category-header[data-target="${catId}"]`);
                    const catBtn = catHeader?.querySelector('.signal-toggle-btn');
                    categoryContent.classList.remove('collapsed');
                    categoryContent.classList.add('expanded');
                    if (catBtn) catBtn.innerText = '收起';
                }
            }

            // 延迟滚动等 DOM 展开过渡完成
            setTimeout(() => {
                alertEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                alertEl.style.transition = 'box-shadow 0.5s ease';
                alertEl.style.boxShadow = '0 0 0 3px rgba(12, 111, 143, 0.4)';
                setTimeout(() => { alertEl.style.boxShadow = ''; }, 2500);
            }, 500);
        }

        document.querySelectorAll('.summary-item.clickable').forEach(el => {
            el.addEventListener('click', () => {
                const alertId = el.getAttribute('data-alert-id');
                const listId = el.getAttribute('data-list-id');
                jumpToAlert(alertId, listId);
            });
        });

        const categories = {};
        windows.forEach((w, i) => {
            w._index = i;
            const category = w.category || '其他';
            if (!categories[category]) categories[category] = [];
            categories[category].push(w);
        });

        Object.entries(categories).forEach(([category, catWindows], categoryIndex) => {
            renderCategory(category, catWindows, categoryIndex);
        });

        windows.forEach((w, i) => {
            ['buy-list', 'sell-list', 'trend-list', 'deviation-list'].forEach(kind => {
                const targetId = `${kind}-${i}`;
                const list = document.getElementById(targetId);
                const title = document.querySelector(`.window-group[data-window-index="${i}"] .signal-title[data-target="${targetId}"]`);
                if (!list || !title) return;
                const hasDanger = list.querySelector('.alert-danger') !== null

                    },
                    { name: 'MA5', type: 'line', data: data.dayData.ma5, showSymbol: false, itemStyle: { color: '#e0a926' } },
                    { name: 'MA20', type: 'line', data: data.dayData.ma20, showSymbol: false, itemStyle: { color: '#3277c9' } },
                    { name: '10日高点', type: 'line', data: data.dayData.periodHigh10, showSymbol: false, itemStyle: { color: '#ff5722' }, lineStyle: { type: 'dashed' } }
                ]
            });
            return chart;
        }

        function initChart(windowIndex, chartKey) {
            const key = `${windowIndex}-${chartKey}`;
            if (chartInstances[key]) return chartInstances[key];
            const data = windows[windowIndex];
            let chart;
            if (chartKey === 'week') chart = initEtfWeekChart(windowIndex, data);
            else if (chartKey === 'month') chart = initEtfMonthChart(windowIndex, data);
            else if (chartKey === 'monthBoll') chart = initEtfMonthBollChart(windowIndex, data);
            else if (chartKey === 'monthKdj') chart = initEtfMonthKdjChart(windowIndex, data);
            else if (chartKey === 'boll') chart = initEtfBollChart(windowIndex, data);
            else if (chartKey === 'rsi') chart = initEtfRsiChart(windowIndex, data);
            else if (chartKey === 'deviation') chart = initDeviationChart(windowIndex, data);
            else if (chartKey === 'day') chart = initGreeDayChart(windowIndex, data);
            else if (chartKey === 'weekMA') chart = initWeekMAChart(windowIndex, data);
            else if (chartKey === 'weekBollMA60') chart = initWeekBollMA60Chart(windowIndex, data);
            else if (chartKey === 'monthMA20') chart = initMonthMA20Chart(windowIndex, data);
            if (chart) chartInstances[key] = chart;
            return chart;
        }

        function expandSection(targetId) {
            const panel = document.getElementById(targetId);
            const title = document.querySelector(`.signal-title[data-target="${targetId}"]`);
            const btn = title?.querySelector('.signal-toggle-btn');
            if (!panel || !panel.classList.contains('collapsed')) return;
            panel.classList.remove('collapsed');
            panel.classList.add('expanded');
            if (btn) btn.innerText = '收起';
        }

        function expandChartPanel(windowIndex, chartKey) {
            const panelId = `chart-panel-${windowIndex}-${chartKey}`;
            const panel = document.getElementById(panelId);
            const btn = document.querySelector(`.toggle-btn[data-target="${panelId}"]`);
            if (!panel) return;

            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                panel.classList.add('expanded');
                if (btn) btn.innerText = '收起';
            }

            requestAnimationFrame(() => {
                const chart = initChart(windowIndex, chartKey);
                if (chart) chart.resize();
            });
        }

        function handleDeviationAutoExpand(targetId) {
            if (targetId.startsWith('trend-list-')) {
                const windowIndex = targetId.replace('trend-list-', '');
                expandSection(`deviation-list-${windowIndex}`);
                expandChartPanel(windowIndex, 'deviation');
                return;
            }
            if (targetId.startsWith('deviation-list-')) {
                const windowIndex = targetId.replace('deviation-list-', '');
                expandChartPanel(windowIndex, 'deviation');
            }
        }

        // 板块折叠/展开交互
        document.querySelectorAll('.category-header, .category-header .signal-toggle-btn').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('signal-toggle-btn')) {
                    e.stopPropagation();
                }
                const targetId = el.getAttribute('data-target');
                const panel = document.getElementById(targetId);
                const btn = document.querySelector(`.category-header .signal-toggle-btn[data-target="${targetId}"]`);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        // 大卡片折叠/展开交互
        document.querySelectorAll('.signal-title, .signal-toggle-btn').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('signal-toggle-btn')) {
                    e.stopPropagation();
                }
                const targetId = el.getAttribute('data-target');
                const panel = document.getElementById(targetId);
                const btn = document.querySelector(`.signal-toggle-btn[data-target="${targetId}"]`);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';
                    handleDeviationAutoExpand(targetId);
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        // 图表折叠/展开交互
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const windowIndex = btn.getAttribute('data-window');
                const chartKey = btn.getAttribute('data-chart');
                const panel = document.getElementById(targetId);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';
                    requestAnimationFrame(() => {
                        const chart = initChart(windowIndex, chartKey);
                        if (chart) chart.resize();
                    });
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        window.addEventListener('resize', () => {
            Object.values(chartInstances).forEach(chart => chart.resize());
        });
    </script>
</body>
</html>
