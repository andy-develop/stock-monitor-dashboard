<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 自动化监控看板</title>
    <script src="echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { margin: 0; font-size: 24px; color: #1a1a1a; }
        .header .subtitle { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        .header .meta { text-align: right; color: #888; font-size: 13px; }
        .signal-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .signal-title {
            margin: 0;
            padding: 16px 20px;
            font-size: 18px;
            color: #fff;
            background: #2c3e50;
        }
        .signals-list { padding: 16px 20px; }
        .alert-card {
            padding: 15px 18px;
            border-radius: 6px;
            margin-bottom: 14px;
            border-left: 5px solid;
        }
        .alert-card:last-child { margin-bottom: 0; }
        .alert-danger { background: #fff0f0; border-left-color: #ff4d4f; color: #a61d24; }
        .alert-success { background: #f6ffed; border-left-color: #52c41a; color: #237804; }
        .alert-card h3 { margin: 0 0 10px 0; font-size: 17px; }
        .alert-card p { margin: 0 0 12px 0; font-size: 14px; line-height: 1.5; }
        .alert-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .alert-metric {
            background: rgba(255,255,255,0.65);
            padding: 10px 14px;
            border-radius: 6px;
        }
        .alert-metric .label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
        .alert-metric .value { font-size: 18px; font-weight: 600; }
        .chart-box {
            background: rgba(255,255,255,0.55);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 10px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-box h2 { margin: 0; font-size: 15px; color: #444; }
        .toggle-btn {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.12);
            color: #333;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,1); }
        .chart-panel {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease;
        }
        .chart-panel.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }
        .chart-panel.expanded {
            max-height: 560px;
            opacity: 1;
            margin-top: 12px;
        }
        .chart { width: 100%; height: 500px; }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header .meta { text-align: left; }
            .chart { height: 360px; }
            .chart-panel.expanded { max-height: 420px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 id="stock-title">加载中...</h1>
                <p class="subtitle" id="stock-subtitle">自动监控系统</p>
            </div>
            <div class="meta">
                <div id="update-time">-</div>
                <div id="data-source" style="margin-top: 4px;"></div>
            </div>
        </div>

        <div class="signal-card">
            <h2 class="signal-title">买入信号</h2>
            <div class="signals-list" id="buy-signals-container"></div>
        </div>

        <div class="signal-card">
            <h2 class="signal-title">卖出信号</h2>
            <div class="signals-list">
                <div class="empty-state">暂无卖出信号</div>
            </div>
        </div>
    </div>

    <script>
        // 数据占位符，由构建脚本注入
        // __DATA_PLACEHOLDER__

        if (!window.DASHBOARD_DATA) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;">数据加载失败，请稍后刷新</div>';
            throw new Error('DASHBOARD_DATA not found');
        }

        const data = window.DASHBOARD_DATA;

        // 头部信息
        document.getElementById('stock-title').innerText = `${data.stockName} (${data.stockCode})`;
        document.getElementById('stock-subtitle').innerText = `${data.indexName} · 自动化监控`;
        document.getElementById('update-time').innerText = `更新时间：${data.updateTime}`;

        // 买入信号模块（包含周K线和月K线两个 alert）
        const buySignalsContainer = document.getElementById('buy-signals-container');

        data.alerts.forEach((alert) => {
            const card = document.createElement('div');
            card.className = `alert-card alert-${alert.type}`;

            let metricsHtml = '';
            if (alert.metrics && alert.metrics.length > 0) {
                const items = alert.metrics.map(m => `
                    <div class="alert-metric">
                        <div class="label">${m.label}</div>
                        <div class="value">${m.value}</div>
                    </div>
                `).join('');
                metricsHtml = `<div class="alert-metrics">${items}</div>`;
            }

            let chartHtml = '';
            if (alert.chartKey === 'week') {
                chartHtml = `
                    <div class="chart-box">
                        <div class="chart-header">
                            <h2>周K线及 KDJ(9,3,3) 联动趋势图</h2>
                            <button class="toggle-btn" type="button" data-target="week-chart-panel" data-chart="week">展开</button>
                        </div>
                        <div id="week-chart-panel" class="chart-panel collapsed">
                            <div id="week-chart" class="chart"></div>
                        </div>
                    </div>
                `;
            } else if (alert.chartKey === 'month') {
                chartHtml = `
                    <div class="chart-box">
                        <div class="chart-header">
                            <h2>月K线及 MA 趋势图</h2>
                            <button class="toggle-btn" type="button" data-target="month-chart-panel" data-chart="month">展开</button>
                        </div>
                        <div id="month-chart-panel" class="chart-panel collapsed">
                            <div id="month-chart" class="chart"></div>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `<h3>${alert.title}</h3><p>${alert.reason}</p>${metricsHtml}${chartHtml}`;
            buySignalsContainer.appendChild(card);
        });

        // 图表懒初始化
        const chartInstances = {};

        function initWeekChart() {
            if (chartInstances.week) return chartInstances.week;
            const weekChart = echarts.init(document.getElementById('week-chart'));
            weekChart.setOption({
                grid: [
                    { left: '8%', right: '4%', top: '10%', height: '45%' },
                    { left: '8%', right: '4%', top: '62%', height: '28%' }
                ],
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: { data: ['周K线', 'K', 'D', 'J'], top: 0 },
                xAxis: [
                    { type: 'category', data: data.weekData.dates, gridIndex: 0, axisLine: { onZero: false } },
                    { type: 'category', data: data.weekData.dates, gridIndex: 1 }
                ],
                yAxis: [
                    { scale: true, splitArea: { show: true }, gridIndex: 0 },
                    { min: 0, max: 100, gridIndex: 1 }
                ],
                dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 50, end: 100 }],
                series: [
                    {
                        name: '周K线',
                        type: 'candlestick',
                        data: data.weekData.candlestick,
                        xAxisIndex: 0,
                        yAxisIndex: 0,
                        itemStyle: {
                            color: '#ef5350',
                            color0: '#26a69a',
                            borderColor: '#ef5350',
                            borderColor0: '#26a69a'
                        }
                    },
                    { name: 'K', type: 'line', data: data.weekData.k, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#e0a926' } },
                    { name: 'D', type: 'line', data: data.weekData.d, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#3277c9' } },
                    { name: 'J', type: 'line', data: data.weekData.j, xAxisIndex: 1, yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#c437a3' } }
                ]
            });
            chartInstances.week = weekChart;
            return weekChart;
        }

        function initMonthChart() {
            if (chartInstances.month) return chartInstances.month;
            const monthChart = echarts.init(document.getElementById('month-chart'));
            const monthOption = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['收盘价', 'MA'], top: 0 },
                xAxis: { type: 'category', data: data.monthData.dates },
                yAxis: { scale: true, splitArea: { show: true } },
                dataZoom: [{ type: 'inside', start: 0, end: 100 }],
                series: [
                    { name: '收盘价', type: 'line', data: data.monthData.closes, showSymbol: false, itemStyle: { color: '#3277c9' }, areaStyle: { opacity: 0.1 } }
                ]
            };
            if (data.monthData.maPeriod) {
                monthOption.series.push({
                    name: `MA${data.monthData.maPeriod}`,
                    type: 'line',
                    data: data.monthData.ma,
                    showSymbol: false,
                    itemStyle: { color: '#e0a926' }
                });
                monthOption.legend.data.push(`MA${data.monthData.maPeriod}`);
            }
            monthChart.setOption(monthOption);
            chartInstances.month = monthChart;
            return monthChart;
        }

        // 折叠/展开交互
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const chartKey = btn.getAttribute('data-chart');
                const panel = document.getElementById(targetId);
                const isCollapsed = panel.classList.contains('collapsed');

                if (isCollapsed) {
                    panel.classList.remove('collapsed');
                    panel.classList.add('expanded');
                    btn.innerText = '收起';

                    requestAnimationFrame(() => {
                        if (chartKey === 'week') {
                            const chart = initWeekChart();
                            chart.resize();
                        } else if (chartKey === 'month') {
                            const chart = initMonthChart();
                            chart.resize();
                        }
                    });
                } else {
                    panel.classList.remove('expanded');
                    panel.classList.add('collapsed');
                    btn.innerText = '展开';
                }
            });
        });

        window.addEventListener('resize', () => {
            Object.values(chartInstances).forEach(chart => chart.resize());
        });
    </script>
</body>
</html>
